<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMatch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg, #fff1f5, #fff7ed);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:950px;
    min-height:550px;
    background:white;
    border-radius:35px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    overflow:hidden;
    display:flex;
}

.left{
    flex:1;
    padding:70px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.tag{
    width:fit-content;
    padding:10px 18px;
    background:#ffe4e6;
    color:#e11d48;
    border-radius:30px;
    font-size:14px;
    margin-bottom:25px;
    font-weight:bold;
}

h1{
    font-size:58px;
    color:#1f2937;
    margin-bottom:20px;
}

p{
    font-size:20px;
    line-height:1.6;
    color:#6b7280;
    max-width:420px;
    margin-bottom:35px;
}

button{
    width:220px;
    padding:18px;
    border:none;
    border-radius:16px;
    background: linear-gradient(90deg, #fb7185, #f97316);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(249,115,22,0.25);
}

.right{
    flex:1;
    background: linear-gradient(180deg, #fff1f2, #fff7ed);
    position:relative;
}

.bloco1, .bloco2, .bloco3{
    position:absolute;
    border-radius:30px;
}

.bloco1{
    width:180px;
    height:180px;
    background:#fecdd3;
    top:80px;
    left:80px;
}

.bloco2{
    width:140px;
    height:140px;
    background:#fed7aa;
    bottom:120px;
    right:100px;
}

.bloco3{
    width:90px;
    height:90px;
    background:#fbcfe8;
    top:250px;
    right:180px;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .right{
        min-height:250px;
    }

    h1{
        font-size:42px;
    }

    .left{
        padding:40px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="left">
        <div class="tag">Tabela de Medidas Inteligente</div>

        <h1>FitMatch</h1>

        <p>
            Descubra seu tamanho ideal com base nas suas medidas corporais.
            Uma experiência prática, personalizada e inteligente para compras online.
        </p>

        <button onclick="entrar()">Começar</button>
    </div>

    <div class="right">
        <div class="bloco1"></div>
        <div class="bloco2"></div>
        <div class="bloco3"></div>
    </div>

</div>

<script>
function entrar(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
