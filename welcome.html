<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMatch - Cadastro</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body{ background: linear-gradient(135deg, #fff1f5, #fff7ed); padding:30px; min-height:100vh; }
        .container{ max-width:1100px; margin:auto; background:white; padding:40px; border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,0.08); }
        h1{ font-size:42px; color:#1f2937; margin-bottom:10px; }
        .subtitulo{ color:#6b7280; margin-bottom:35px; font-size:18px; }
        .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; }
        input, select{ width:100%; padding:14px; margin-bottom:14px; border-radius:14px; border:1px solid #fbcfe8; background:#fffafb; font-size:15px; outline:none; }
        input:focus, select:focus{ border:1px solid #fb7185; }
        button{ width:100%; padding:16px; background:linear-gradient(90deg, #fb7185, #f97316); color:white; border:none; border-radius:14px; font-size:17px; cursor:pointer; transition:0.3s; margin-top:10px; }
        button:hover{ transform:translateY(-3px); box-shadow:0 10px 20px rgba(249,115,22,0.25); }
        .preview{ text-align:center; background:linear-gradient(180deg, #fff1f2, #fff7ed); padding:30px; border-radius:25px; }
        .medidas-container{ position:relative; display:inline-block; }
        .medidas-container img{ width:100%; max-width:400px; }
        .numero{ position:absolute; width:22px; height:22px; border-radius:50%; background:#fb7185; color:white; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
        .n1{ top:28%; left:23%; } .n2{ top:42%; left:24%; } .n3{ top:52%; left:24%; } .n4{ top:10%; left:43%; } .n5{ top:23%; right:18%; }
        .n6{ top:53%; left:48%; } .n7{ bottom:3%; left:38%; } .n8{ top:58%; right:20%; } .n9{ top:78%; right:23%; } .n10{ bottom:1%; right:42%; }
        @media(max-width:900px){ .form-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Cadastro de Medidas</h1>
    <p class="subtitulo">Preencha suas medidas corporais para receber recomendações personalizadas.</p>
    <div class="form-grid">
        <div>
            <select id="sexo" onchange="alterarCampo()">
                <option value="">Selecione seu sexo</option>
                <option value="feminino">Feminino</option>
                <option value="masculino">Masculino</option>
            </select>
            <input type="number" id="busto" placeholder="1 - Medida superior">
            <input type="number" id="cintura" placeholder="2 - Cintura">
            <input type="number" id="quadril" placeholder="3 - Quadril">
            <input type="number" id="pescoco" placeholder="4 - Pescoço">
            <input type="number" id="braco" placeholder="5 - Braço">
            <input type="number" id="tronco" placeholder="6 - Tronco">
            <input type="number" id="perna" placeholder="7 - Comprimento da perna">
            <input type="number" id="coxa" placeholder="8 - Coxa">
            <input type="number" id="panturrilha" placeholder="9 - Panturrilha">
            <input type="number" id="pe" placeholder="10 - Pé">
            <button onclick="salvar()">Salvar medidas</button>
        </div>
        <div class="preview">
            <div class="medidas-container">
                <img src="Medidas_page-0001.png" alt="Guia corporal">
                <span class="numero n1">1</span><span class="numero n2">2</span><span class="numero n3">3</span>
                <span class="numero n4">4</span><span class="numero n5">5</span><span class="numero n6">6</span>
                <span class="numero n7">7</span><span class="numero n8">8</span><span class="numero n9">9</span><span class="numero n10">10</span>
            </div>
            <p>Guia de medição corporal</p>
        </div>
    </div>
</div>

<script>
function alterarCampo(){
    let sexo = document.getElementById("sexo").value;
    let campo = document.getElementById("busto");
    if(sexo === "feminino") campo.placeholder = "1 - Busto";
    else if(sexo === "masculino") campo.placeholder = "1 - Tórax";
    else campo.placeholder = "1 - Medida superior";
}

function salvar(){
    const ids = ["sexo", "busto", "cintura", "quadril", "pescoco", "braco", "tronco", "perna", "coxa", "panturrilha", "pe"];
    let todosPreenchidos = true;

    ids.forEach(id => {
        if(!document.getElementById(id).value) todosPreenchidos = false;
    });

    if(!todosPreenchidos){
        alert("Campos de medida em branco, não é possível prosseguir.");
        return;
    }

    const medidas = {};
    ids.forEach(id => { medidas[id] = document.getElementById(id).value; });

    localStorage.setItem("medidasUsuario", JSON.stringify(medidas));
    alert("Medidas salvas com sucesso!");
    window.location.href = "upload.html";
}
</script>
</body>
</html>
